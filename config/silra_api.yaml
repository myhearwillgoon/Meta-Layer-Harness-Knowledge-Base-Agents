silra_api:
  base_url: "https://api.silra.cn/v1"
  api_key_env: "SILRA_API_KEY"
  timeout_seconds: 30
  max_retries: 3
  retry_delay_seconds: 2

models:
  call1:
    model: "glm-4.5-air"
    max_tokens: 30000
    temperature: 0.1
  call2:
    model: "glm-4.5-air"
    max_tokens: 5000
    temperature: 0.3
  call3:
    complex_model: "glm-4.5-air"
    routine_model: "glm-4.5-air"
    max_input_tokens: 200000
    max_output_tokens: 32000
    temperature: 0.2
  triage:
    model: "glm-4.5-air"
    max_tokens: 5000
    temperature: 0.1

# Injection Points Configuration
# 10 injection points for rule engine

injection_points:
  - id: IP-01
    name: "email.call1"
    description: "Before Call #1 (relevance judgment)"
    trigger: "Before relevance LLM call"
    content_type: "routing_rules, file_type_priorities"

  - id: IP-02
    name: "email.embed"
    description: "Before Call #2 (embed query generation)"
    trigger: "Before embed query LLM call"
    content_type: "embed_query_rules"

  - id: IP-03
    name: "email.analysis"
    description: "Before Call #3 (analysis)"
    trigger: "Before analysis LLM call"
    content_type: "analysis_rules, tone_instructions"

  - id: IP-04
    name: "goals.creation"
    description: "Before goal creation"
    trigger: "Before creating new goal"
    content_type: "goal_format_rules, autonomy_level_limits"

  - id: IP-05
    name: "goals.review"
    description: "Before goal review"
    trigger: "Before reviewing existing goal"
    content_type: "review_standards, completion_criteria"

  - id: IP-06
    name: "goals.replan"
    description: "Before goal replanning"
    trigger: "Before replanning goal"
    content_type: "replanning_rules, cascade_strategies"

  - id: IP-07
    name: "qa.relevance"
    description: "Before QA relevance judgment"
    trigger: "Before QA routing decision"
    content_type: "qa_routing_rules"

  - id: IP-08
    name: "qa.embed"
    description: "Before QA embed query"
    trigger: "Before QA search query generation"
    content_type: "qa_search_rules"

  - id: IP-09
    name: "qa.answer"
    description: "Before QA answer"
    trigger: "Before generating QA response"
    content_type: "qa_answer_format, confidence_requirements"

  - id: IP-10
    name: "compose"
    description: "Before any compose operation"
    trigger: "Before any writing operation"
    content_type: "general_compose_rules, style_instructions"
